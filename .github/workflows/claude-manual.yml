name: Claude Code - Manual Trigger

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for Claude'
        required: true
        type: string
      issue_number:
        description: 'Issue/PR number (optional - for context)'
        required: false
        type: number

jobs:
  run-claude:
    uses: SkogAI/.github/.github/workflows/claude-manual.yml@master
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      prompt: ${{ inputs.prompt }}
      issue_number: ${{ inputs.issue_number || 0 }}
      # Optional: Customize allowed tools
      # claude_args: '--allowed-tools Bash(gh:*)'
